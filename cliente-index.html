<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Criativa — Portal do Cliente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"/>

    <link rel="icon" type="image/png" href="https://painel.teamcriativa.com/icones/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="https://painel.teamcriativa.com/icones/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://painel.teamcriativa.com/icones/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Criativa" />
    <link rel="manifest" href="https://painel.teamcriativa.com/icones/site.webmanifest" />

    <link rel="stylesheet" href="cliente-index.css">
    <link rel="stylesheet" href="modules/conteudo/conteudo.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- HEADER -->
<header class="c-header">
    <a href="cliente-index.html" class="c-header-logo">
        <img src="logo criativa.svg" alt="Criativa">
    </a>

    <span class="c-header-badge">
        <i class="ph ph-star"></i> Portal do Cliente
    </span>

    <div class="c-header-spacer"></div>

    <!-- Conta ativa + dropdown -->
    <div style="position:relative;">
        <button class="c-account-btn" id="account-btn" aria-haspopup="true">
            <div class="c-account-avatar" id="account-avatar">?</div>
            <div class="c-account-info">
                <span class="c-account-name" id="account-name">Carregando…</span>
                <span class="c-account-sub"  id="account-sub">Portal do Cliente</span>
            </div>
            <i class="ph ph-caret-down c-account-caret" id="account-caret"></i>
        </button>
        <div class="c-account-drop" id="account-drop" role="menu"></div>
    </div>
</header>

<!-- BODY -->
<div class="c-body">

    <!-- SIDEBAR -->
    <nav class="c-sidebar" id="c-sidebar" aria-label="Navegação principal">
        <span class="c-nav-label">Menu</span>

        <button class="c-nav-item" data-modulo="conteudos">
            <i class="ph ph-images"></i> Conteúdos
        </button>
        <button class="c-nav-item" data-modulo="agendamentos">
            <i class="ph ph-calendar-check"></i> Agendamentos
        </button>
        <button class="c-nav-item" data-modulo="planejamento">
            <i class="ph ph-kanban"></i> Planejamento
        </button>
        <button class="c-nav-item" data-modulo="drive">
            <i class="ph ph-folder-open"></i> Drive
        </button>
    </nav>

    <!-- CONTEÚDO -->
    <main class="c-content" id="c-content"></main>

</div>

<!-- Mobile -->
<div id="mob-overlay"></div>
<button id="btn-mob-menu">
    <i class="ph ph-list"></i> Menu
</button>

<!-- ── Scripts principais (ordem obrigatória) ── -->
<script>
// ── Supabase config ───────────────────────────────────────────
const SUPABASE_URL      = 'https://owpboqevrtthsupugcrt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93cGJvcWV2cnR0aHN1cHVnY3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM5MjY4MDQsImV4cCI6MjA2OTUwMjgwNH0.7RjkVOUT6ByewP0D6FgHQjZDCoi4GYnGT6BMj794MfQ';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Sessão ────────────────────────────────────────────────────
const SESSION_KEY = 'criativa_cliente_sessao';

function getSessao() {
    try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function setSessao(s) { sessionStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function logout() { sessionStorage.removeItem(SESSION_KEY); window.location.href = 'cliente-login.html'; }

function _placeholder(el, icon, title, desc) {
    el.innerHTML = `
        <div class="c-placeholder">
            <div class="c-placeholder-icon"><i class="ph ${icon}"></i></div>
            <h2>${title}</h2>
            <p>${desc}</p>
        </div>`;
}

// ── Navegação ─────────────────────────────────────────────────
let _moduloAtivo = null;

function carregarModulo(id) {
    const mod = MODULOS.find(m => m.id === id);
    if (!mod) return;
    _moduloAtivo = id;

    document.querySelectorAll('.c-nav-item[data-modulo]').forEach(el => {
        el.classList.toggle('active', el.dataset.modulo === id);
    });

    const sessao = getSessao();
    mod.render(document.getElementById('c-content'), sessao?.contaAtual);
    _fecharSidebar();
}

// ── Header / dropdown de contas ───────────────────────────────
function _atualizarHeaderConta(conta) {
    document.getElementById('account-name').textContent = conta.usuario || conta.responsavel || 'Cliente';
    document.getElementById('account-sub').textContent  = conta.id_instagram ? `@${conta.id_instagram}` : 'Portal do Cliente';

    const av = document.getElementById('account-avatar');
    if (conta.profile_photo) {
        av.innerHTML = `<img src="${conta.profile_photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else {
        av.textContent = (conta.usuario || conta.responsavel || '?').charAt(0).toUpperCase();
    }
}

function _renderDropdown(contas, contaAtual) {
    const drop = document.getElementById('account-drop');
    drop.innerHTML = '';

    contas.forEach(conta => {
        const item = document.createElement('div');
        item.className = 'c-drop-item' + (conta.id === contaAtual.id ? ' active' : '');

        const av = document.createElement('div');
        av.className = 'c-account-avatar';
        if (conta.profile_photo) {
            av.innerHTML = `<img src="${conta.profile_photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        } else {
            av.textContent = (conta.usuario || conta.responsavel || '?').charAt(0).toUpperCase();
        }

        item.innerHTML += `
            <div style="flex:1;min-width:0;">
                <div class="c-drop-item-name">${conta.usuario || conta.responsavel || 'Conta'}</div>
                ${conta.id_instagram ? `<div class="c-drop-item-sub">@${conta.id_instagram}</div>` : ''}
            </div>
            <i class="ph ph-check c-check"></i>`;
        item.prepend(av);

        item.addEventListener('click', () => {
            const s = getSessao();
            s.contaAtual = conta;
            setSessao(s);
            _atualizarHeaderConta(conta);
            _renderDropdown(contas, conta);
            _toggleDrop(false);
            if (_moduloAtivo) carregarModulo(_moduloAtivo);
        });

        drop.appendChild(item);
    });

    drop.insertAdjacentHTML('beforeend', '<div class="c-drop-divider"></div>');
    const btnSair = document.createElement('button');
    btnSair.className = 'c-drop-logout';
    btnSair.innerHTML = '<i class="ph ph-sign-out"></i> Sair';
    btnSair.addEventListener('click', logout);
    drop.appendChild(btnSair);
}

function _toggleDrop(force) {
    const btn  = document.getElementById('account-btn');
    const drop = document.getElementById('account-drop');
    const abrir = force !== undefined ? force : !drop.classList.contains('open');
    btn.classList.toggle('open', abrir);
    drop.classList.toggle('open', abrir);
}

function _fecharSidebar() {
    document.getElementById('c-sidebar').classList.remove('open');
    document.getElementById('mob-overlay').classList.remove('open');
}

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    const sessao = getSessao();
    if (!sessao?.contaAtual) { window.location.href = 'cliente-login.html'; return; }

    const { contas, contaAtual } = sessao;

    _atualizarHeaderConta(contaAtual);
    _renderDropdown(contas, contaAtual);

    if (contas.length <= 1) document.getElementById('account-caret').style.display = 'none';

    document.getElementById('account-btn').addEventListener('click', e => {
        e.stopPropagation();
        _toggleDrop();
    });

    document.addEventListener('click', () => _toggleDrop(false));

    document.querySelectorAll('.c-nav-item[data-modulo]').forEach(el => {
        el.addEventListener('click', () => carregarModulo(el.dataset.modulo));
    });

    document.getElementById('btn-mob-menu').addEventListener('click', () => {
        document.getElementById('c-sidebar').classList.add('open');
        document.getElementById('mob-overlay').classList.add('open');
    });
    document.getElementById('mob-overlay').addEventListener('click', _fecharSidebar);

    carregarModulo('conteudos');
});
</script>

<!-- Módulos — carregados APÓS o script principal -->
<script src="modules/conteudo/conteudo-carousel.js"></script>
<script src="modules/conteudo/conteudo-modal.js"></script>
<script src="modules/conteudo/conteudo-grid.js"></script>
<script src="modules/conteudo/conteudo.js"></script>

<!-- MODULOS precisa de render() já definido, então fica por último -->
<script>
const MODULOS = [
    {
        id: 'conteudos', label: 'Conteúdos', icon: 'ph-images',
        render(el, conta) { render(el, conta); }
    },
    {
        id: 'agendamentos', label: 'Agendamentos', icon: 'ph-calendar-check',
        render(el, conta) { _placeholder(el, 'ph-calendar-check', 'Agendamentos', 'Visualize e acompanhe os agendamentos de publicação.'); }
    },
    {
        id: 'planejamento', label: 'Planejamento', icon: 'ph-kanban',
        render(el, conta) { _placeholder(el, 'ph-kanban', 'Planejamento', 'Acompanhe o planejamento estratégico da sua presença digital.'); }
    },
    {
        id: 'drive', label: 'Drive', icon: 'ph-folder-open',
        render(el, conta) { _placeholder(el, 'ph-folder-open', 'Drive', 'Acesse os arquivos e materiais produzidos para você.'); }
    },
];
</script>

</body>
</html>
